name: iraq_edu_app
description: "Iraqi educational platform for 6th Grade Scientific high school students. Arabic-first, RTL Flutter app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Localization
  intl: any

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Firebase (placeholders wired in firebase_options.dart; replace via `flutterfire configure`).
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # Local persistence (used by the coupon feature for the no-backend demo).
  shared_preferences: ^2.3.3

  # Typography
  google_fonts: ^6.2.1
  chewie: ^1.14.0
  video_player: ^2.11.1
  url_launcher: ^6.3.2
  flutter_windowmanager_plus: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Bundled study-guide PDFs. Drop a file into assets/pdfs/ and add a row
    # to assets/pdfs/manifest.json — see assets/pdfs/README.md for details.
    - assets/pdfs/
