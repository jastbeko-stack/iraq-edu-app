<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/iraq-edu-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- viewport-fit=cover lets the page extend behind the iOS notch / safe-area
       so the status bar can appear transparent over the content. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="منصة المهندس التعليمية — منصة تعليمية للطلاب في العراق.">

  <!-- Tints the browser/OS chrome (status bar on Chrome Android, address bar
       on iOS Safari 15+) to the brand red so the system bar blends into the
       AppBar instead of showing an opaque white strip. -->
  <meta name="theme-color" content="#CE1126" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101114" media="(prefers-color-scheme: dark)">

  <!-- iOS / PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- black-translucent makes iOS status bar transparent and overlay the page;
       combined with viewport-fit=cover the page paints under the bar. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="منصة المهندس">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>منصة المهندس التعليمية</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Paint the body with the brand color so the area behind the iOS status
       bar (which is now translucent) is the same red as the AppBar — no white
       gap at the top. Flutter's canvas paints over this once it boots. */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #CE1126;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #101114; }
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
